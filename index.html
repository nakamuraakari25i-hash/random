<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ランダムページ</title>
  <style>
    body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f0f0; }
    button { font-size: 24px; padding: 20px 40px; border-radius: 12px; border: none; background: #4CAF50; color: white; cursor: pointer; }
    button:active { background: #388E3C; }
  </style>
</head>
<body>
  <button onclick="goRandom()">ランダムに飛ぶ</button>
  <script>
    const pages = [
      "https://docs.google.com/document/d/18z7FsBDMCYidxCYWJICV4LwC8x6Yf-YP5kwBZ7mwSbc/edit?tab=t.0",
      "https://docs.google.com/document/d/1nqyuiSOIFxtAdI778s-WNe3Vi3_gGIQZouSmuVBwxj8/edit?tab=t.n6qouw8gnmhz"
    ];
    function goRandom() {
      const url = pages[Math.floor(Math.random() * pages.length)];
      window.location.href = url;
    }
  </script>
</body>
</html>
