<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>シンプルな表のページ</title>
    <style>
        /* 画面中央に見やすく配置する設定 */
        body {
            font-family: sans-serif;
            margin: 40px auto;
            max-width: 800px;
            padding: 0 20px;
            color: #333;
        }
        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        /* 表全体のデザイン設定 */
        table {
            width: 100%;
            border-collapse: collapse; /* 枠線を1本にまとめる */
            margin-top: 10px;
        }
        /* 見出し（一番上の行）の設定 */
        th {
            background-color: #f2f2f2;
            color: #000;
            font-weight: bold;
        }
        /* 全てのマス目の設定 */
        th, td {
            border: 1px solid #ccc;
            padding: 12px;
            text-align: left;
        }
        /* 行を1行おきに背景色を変えて見やすくする設定 */
        tr:nth-child(even) {
            background-color: #fafafa;
        }
    </style>
</head>
<body>

    <table>
        </tr>
        <!-- 表のデータ：1行目 -->
        <tr>
            <td>氏名</td>
            <td>中村灯里</td>
        </tr>
        <!-- 表のデータ：2行目 -->
        <tr>
            <td>年齢</td>
            <td>17</td>
        </tr>
        <!-- 表のデータ：3行目 -->
        <tr>
            <td>性別</td>
            <td>女</td>
        </tr>
    </table>

</body>
</html>
